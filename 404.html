<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | DJ WONDABEATZ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050816;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            max-width: 600px;
            padding: 2rem;
        }
        .error-number {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF5C00, #7C3AED);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h1 { font-size: 1.8rem; margin: 1rem 0; }
        p { color: #9CA3AF; margin-bottom: 2rem; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #FF5C00, #e04e00);
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-number">404</div>
        <h1>The beat dropped but the page is missing</h1>
        <p>Sorry, we couldn't find that page. Let's get you back to the music.</p>
        <a href="/" class="btn"><i class="fas fa-home"></i> Back to Home</a>
    </div>
</body>
</html>
