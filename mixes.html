<section class="page-hero">
    <div class="container">
        <h1 class="page-title">Latest Mixes</h1>
        <p class="page-subtitle">Tap into the energy</p>
    </div>
</section>

<section class="container" style="margin-top: 2rem;">
    <div class="mixes-grid">
        <div class="card"><i class="fas fa-headphones card-icon"></i><h3>Detty Decembers Vol.1</h3><button class="btn btn-primary mix-btn" data-mix="https://audiomack.com/djwondabeatz/song/dj-wonda-beatz-detty-decembers-vol1">Play on Audiomack</button></div>
        <div class="card"><i class="fas fa-music card-icon"></i><h3>More Mixes</h3><button class="btn btn-primary mix-btn" data-mix="https://audiomack.com/djwondabeatz">Audiomack Profile</button></div>
        <div class="card"><i class="fab fa-youtube card-icon"></i><h3>YouTube Live</h3><button class="btn btn-primary mix-btn" data-mix="https://youtube.com/@djwondabeatz2852">Watch on YouTube</button></div>
    </div>
</section>

<!-- Full Audio Player (with shuffle & repeat) -->
<div class="audio-float" id="audioFloat" role="region" aria-label="Audio player" tabindex="0">
    <div class="track-icon"><i class="fas fa-music"></i></div>
    <div class="track-info">
        <h4 id="trackTitle">Let's Worship Vol. 1</h4>
        <p>Now Playing</p>
    </div>
    <div class="player-controls">
        <button class="player-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
        <button class="player-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
        <button class="player-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
        <button class="player-btn" id="shuffleBtn"><i class="fas fa-random"></i></button>
        <button class="player-btn" id="repeatBtn"><i class="fas fa-redo-alt"></i></button>
    </div>
    <div class="progress-wrap">
        <input type="range" id="seekSlider" class="progress-slider" min="0" max="100" step="0.1" value="0">
        <div class="progress-text"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
    </div>
    <div class="volume">
        <i class="fas fa-volume-up"></i>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
    </div>
</div>

<div class="scroll-hint">
    <i class="fas fa-chevron-down"></i>
</div>

</footer>
